<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Index — Models, Concepts & Roles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --text: #e8eaf0;
      --text-muted: #8892b0;
      --accent: #7c6af7;
      --accent-light: #a89df9;
      --green: #4ade80;
      --blue: #60a5fa;
      --orange: #fb923c;
      --pink: #f472b6;
      --yellow: #facc15;
      --radius: 12px;
      --transition: 0.18s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #12152a 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      background: linear-gradient(135deg, #a89df9, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.4rem;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto 1.2rem;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 1.1rem;
    }
    #search {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color var(--transition);
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    /* ── Age Toggle ── */
    .age-toggle {
      display: inline-flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .age-toggle button {
      padding: 0.45rem 1.1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .age-toggle button.active {
      background: var(--accent);
      color: #fff;
    }
    .age-label {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 0.4rem;
    }

    /* ── Category Filters ── */
    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-btn:hover { border-color: var(--accent-light); color: var(--accent-light); }
    .filter-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* ── Main Layout ── */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 4rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    /* ── Cards ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
    .card-name { font-size: 1.05rem; font-weight: 600; }
    .cat-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cat-model    { background: rgba(124,106,247,0.18); color: var(--accent-light); }
    .cat-ml-type  { background: rgba(74,222,128,0.15);  color: var(--green); }
    .cat-arch     { background: rgba(96,165,250,0.15);  color: var(--blue); }
    .cat-concept  { background: rgba(251,146,60,0.15);  color: var(--orange); }
    .cat-role     { background: rgba(244,114,182,0.15); color: var(--pink); }

    .card-summary { color: var(--text-muted); font-size: 0.85rem; }
    .tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
    }
    .explanation {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.65;
    }
    .no-results {
      text-align: center;
      color: var(--text-muted);
      padding: 4rem;
      font-size: 1rem;
      grid-column: 1/-1;
    }
  </style>
</head>
<body>

<header>
  <h1>AI Index</h1>
  <p>Models · ML Types · Architectures · Concepts · Roles — explained for every level</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Search anything — GPT, transformer, product manager…" autocomplete="off" />
  </div>
  <div class="age-label">Explain it like I'm…</div>
  <div class="age-toggle">
    <button data-age="5">👶 Age 5</button>
    <button data-age="10" class="active">🧒 Age 10</button>
    <button data-age="45">💼 Adult</button>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="model">🤖 AI Models</button>
  <button class="filter-btn" data-cat="ml-type">📚 ML Types</button>
  <button class="filter-btn" data-cat="arch">🧠 Architectures</button>
  <button class="filter-btn" data-cat="concept">💡 Concepts</button>
  <button class="filter-btn" data-cat="role">👤 Roles</button>
</div>

<main>
  <div class="results-count" id="count"></div>
  <div class="grid" id="grid"></div>
</main>

// ── Search & Filter State ────────────────────────────────────
let currentAge   = "10";
let currentCat   = "all";
let currentQuery = "";
let filtered     = [...DATA];

const fuse = new Fuse(DATA, {
  keys: [
    { name: "name",    weight: 3 },
    { name: "summary", weight: 2 },
    { name: "tags",    weight: 2 },
    { name: "age5",    weight: 1 },
    { name: "age10",   weight: 1 },
    { name: "age45",   weight: 1 },
  ],
  threshold: 0.35,
  includeScore: true,
});

// ── Category Config ──────────────────────────────────────────
const catClass = {
  model:    "cat-model",
  "ml-type":"cat-ml-type",
  arch:     "cat-arch",
  concept:  "cat-concept",
  role:     "cat-role",
};
const catLabel = {
  model:    "AI Model",
  "ml-type":"ML Type",
  arch:     "Architecture",
  concept:  "Concept",
  role:     "Role",
};

// ── Render ───────────────────────────────────────────────────
function render() {
  const grid  = document.getElementById("grid");
  const count = document.getElementById("count");
  grid.innerHTML = "";

  // Search
  let results;
  if (currentQuery.trim()) {
    results = fuse.search(currentQuery).map(r => r.item);
  } else {
    results = [...DATA];
  }

  // Category filter
  if (currentCat !== "all") {
    results = results.filter(d => d.cat === currentCat);
  }

  count.textContent = `${results.length} result${results.length !== 1 ? "s" : ""}`;

  if (results.length === 0) {
    grid.innerHTML = '<div class="no-results">No results found. Try a different search term.</div>';
    return;
  }

  results.forEach(item => {
    const expl = currentAge === "5"  ? item.age5
               : currentAge === "10" ? item.age10
               :                       item.age45;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-header">
        <div class="card-name">${item.name}</div>
        <span class="cat-badge ${catClass[item.cat]}">${catLabel[item.cat]}</span>
      </div>
      <div class="card-summary">${item.summary}</div>
      <div class="tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      <div class="explanation">${expl}</div>
    `;
    grid.appendChild(card);
  });
}

// ── Event Listeners ──────────────────────────────────────────
document.getElementById("search").addEventListener("input", e => {
  currentQuery = e.target.value;
  render();
});

document.querySelectorAll(".age-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    currentAge = btn.dataset.age;
    document.querySelectorAll(".age-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    currentCat = btn.dataset.cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

// ── Init ─────────────────────────────────────────────────────
render();
</script>
