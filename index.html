<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Index — Models, Concepts, Agentic AI & Roles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --text: #e8eaf0;
      --text-muted: #8892b0;
      --accent: #7c6af7;
      --accent-light: #a89df9;
      --green: #4ade80;
      --blue: #60a5fa;
      --orange: #fb923c;
      --pink: #f472b6;
      --yellow: #facc15;
      --radius: 12px;
      --transition: 0.18s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #12152a 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      background: linear-gradient(135deg, #a89df9, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.4rem;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto 1.2rem;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 1.1rem;
    }
    #search {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color var(--transition);
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    /* ── Age Toggle ── */
    .age-toggle {
      display: inline-flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .age-toggle button {
      padding: 0.45rem 1.1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .age-toggle button.active {
      background: var(--accent);
      color: #fff;
    }
    .age-label {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 0.4rem;
    }

    /* ── Category Filters ── */
    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-btn:hover { border-color: var(--accent-light); color: var(--accent-light); }
    .filter-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* ── Main Layout ── */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 4rem;
    }
    .results-count {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    /* ── Cards ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
    .card-name { font-size: 1.05rem; font-weight: 600; }
    .cat-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cat-model    { background: rgba(124,106,247,0.18); color: var(--accent-light); }
    .cat-ml-type  { background: rgba(74,222,128,0.15);  color: var(--green); }
    .cat-arch     { background: rgba(96,165,250,0.15);  color: var(--blue); }
    .cat-concept  { background: rgba(251,146,60,0.15);  color: var(--orange); }
    .cat-role     { background: rgba(244,114,182,0.15); color: var(--pink); }
    .cat-cloud      { background: rgba(34,211,238,0.15);  color: #22d3ee; }
    .cat-challenge  { background: rgba(251,113,133,0.15); color: #fb7185; }

    .card-summary { color: var(--text-muted); font-size: 0.85rem; }
    .tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
    }
    .explanation {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.65;
    }
    .no-results {
      text-align: center;
      color: var(--text-muted);
      padding: 4rem;
      font-size: 1rem;
      grid-column: 1/-1;
    }
  </style>
</head>

<main>

  <div class="grid" id="grid"></div>
</main>

    age45: "Agentic AI represents the paradigm shift from AI-as-responder to AI-as-actor. Core components: a reasoning model (the 'brain'), a tool layer (web, code execution, APIs, computer use), a memory system (short/long-term), and a planning/reflection loop. In 2025, SWE-bench Verified became the key benchmark — measuring whether an agent can autonomously resolve real GitHub issues. By 2026, 40% of business applications are projected to embed AI agents (up from <5% in 2025). The implementation gap (integration, trust, oversight) — not the technology — is the primary adoption barrier."
  },
  {
    name: "Multi-Agent Systems", cat: "ml-type", tags: ["Orchestration","Collaboration","Specialization","Enterprise","2026"],
    summary: "Networks of specialized AI agents that collaborate — replacing single all-purpose agents",
    age10: "Multi-agent systems use several specialized AI agents that work as a team. One agent might research a problem, another writes the code, a third tests it, and a fourth explains the result. This division of labor lets AI tackle complex, long-running tasks that a single agent can't finish alone. Gartner saw a 1,445% surge in multi-agent inquiries from Q1 2024 to Q2 2025.",
    age45: "Multi-agent architecture mirrors microservices: specialized agents (researcher, coder, critic, orchestrator) collaborate via message passing. Key patterns: Orchestrator-Worker (one agent directs others), Peer-to-Peer (agents negotiate), and Pipeline (sequential handoffs). Google's A2A protocol and Anthropic's MCP are standardizing inter-agent communication. Key PM challenges: observability (tracing cross-agent workflows), fault tolerance (handling agent failures mid-task), cost control (agent loops can spiral), and human-in-the-loop design for high-stakes decisions."
  },
  {
    name: "Test-Time Compute Scaling", cat: "ml-type", tags: ["Reasoning","o3","Inference","Quality","2024-2026"],
    summary: "Spend more compute at inference time — thinking longer — to dramatically improve answer quality",
    age10: "Test-time compute scaling is the idea that you can make AI smarter not just by training it on more data, but by letting it 'think longer' when answering. OpenAI's o1 and o3 models do this — they run an internal reasoning process before responding. The longer they're allowed to think, the better they score on hard problems.",
    age45: "Test-time compute scaling (Snell et al., 2024; OpenAI o1/o3) shifts the quality-compute tradeoff from training to inference. Instead of scaling model size or training data, quality improves by allocating more inference FLOPs to search, self-reflection, or chain-of-thought expansion. Key insight: for fixed training compute, test-time scaling can match a model trained with 10x more data. Product implications: variable-latency pricing models, async task queues for deep reasoning, and user-facing 'thinking' UX patterns. Competes with RAG and fine-tuning as a quality improvement lever."
  },

  // ── NEURAL NET ARCHITECTURES ───────────────────────────
  {
    name: "Transformer", cat: "arch", tags: ["Attention","LLMs","2017","Foundation","NLP"],
    summary: "The architecture behind virtually all modern LLMs — introduced in 'Attention Is All You Need'",
    age10: "The transformer architecture (Google, 2017) uses 'self-attention' to process all parts of a sequence simultaneously — unlike older models that read word-by-word. This lets it understand long-range relationships in text. GPT, BERT, Claude, and almost every modern AI is built on transformers.",
    age45: "Transformers (Vaswani et al., 2017) replaced sequential RNNs with parallel self-attention, solving the vanishing gradient problem for long sequences. Encoder-only (BERT) for understanding; decoder-only (GPT) for generation; encoder-decoder (T5) for translation. Scaled via the scaling laws paper. The dominant architecture for NLP, vision (ViT), audio, and multi-modal tasks."
  },
  {
    name: "CNN (Convolutional Neural Network)", cat: "arch", tags: ["Vision","Images","Filters","Computer Vision"],
    summary: "Specialized architecture for image recognition — uses learned filters to detect features",
    age10: "CNNs are designed for images. They use 'filters' that slide across an image looking for specific patterns — horizontal lines, curves, color blobs. Early layers detect simple shapes; deeper layers detect complex objects. CNNs power face recognition, medical imaging, self-driving car vision, and most photo apps.",
    age45: "CNNs exploit spatial locality and translation invariance via convolutional filters, pooling layers, and hierarchical feature extraction. Landmark architectures: LeNet, VGG, ResNet (skip connections), EfficientNet. Largely superseded by Vision Transformers (ViT) for large-scale tasks, but CNNs remain compute-efficient for edge/mobile deployment. Core skill for any ML engineer working on vision pipelines."
  },
  {
    name: "RNN / LSTM", cat: "arch", tags: ["Sequential","Time Series","Memory","Pre-Transformer"],
    summary: "Recurrent networks that process sequences step-by-step — dominant before transformers",
    age10: "RNNs (Recurrent Neural Networks) process sequences one element at a time, passing a 'hidden state' forward. LSTMs (Long Short-Term Memory) added gating mechanisms to remember important things longer. They were the best NLP models before transformers. Still used in time series forecasting and some real-time applications.",
    age45: "RNNs use recurrent connections to model sequential dependencies, with LSTM/GRU gating solving the vanishing gradient problem for longer sequences. Superseded by transformers for NLP (2017+) but still relevant for real-time time series (latency-sensitive streaming), embedded systems, and sensor data where transformers' O(n²) attention is prohibitive."
  },
  {
    name: "GAN (Generative Adversarial Network)", cat: "arch", tags: ["Generative","Adversarial","Images","2014"],
    summary: "Two neural networks compete — one generating, one judging — to produce realistic outputs",
    age10: "GANs have two networks: a Generator that creates fake images, and a Discriminator that tries to tell real from fake. They train together — the generator gets better at fooling the discriminator, and the discriminator gets better at detecting fakes. Used for deepfakes, image editing, and data augmentation.",
    age45: "GANs (Goodfellow et al., 2014) introduced adversarial training: G minimizes while D maximizes the same objective. Produced remarkable photorealism (StyleGAN, BigGAN) but suffer from training instability and mode collapse. Largely supplanted by diffusion models for image generation (2022+) due to better stability and diversity. Still used in video synthesis and specialized image-to-image translation."
  },
  {
    name: "Diffusion Model", cat: "arch", tags: ["Generative","Images","DALL-E","Stable Diffusion","Denoising"],
    summary: "Generates images by learning to reverse a noise-addition process",
    age10: "Diffusion models work by training on the process of adding and removing noise. First they corrupt images gradually until they become random noise. Then they learn to reverse that: starting from noise and step-by-step revealing a coherent image. DALL-E 3 and Stable Diffusion use this approach.",
    age45: "Diffusion models (DDPM, Rombach et al.) outperformed GANs on image quality and diversity (2021-2022). Key mechanism: learn the score function of the data distribution to denoise iteratively. Latent diffusion (Stable Diffusion) operates in compressed latent space — enabling training on consumer GPUs. Extended to audio (AudioLDM), video (Sora/Gen-2), and 3D generation. Now the dominant paradigm for generative media."
  },
  {
    name: "Attention Mechanism", cat: "arch", tags: ["Transformer","Self-Attention","Key Concept","QKV"],
    summary: "Lets models dynamically focus on relevant parts of input — the core of transformers",
    age10: "Attention is a technique where the model decides how much to 'pay attention' to each part of the input when computing each output. It creates relationships between all positions in a sequence simultaneously. This is why transformers handle long-range dependencies so much better than RNNs.",
    age45: "Self-attention computes attention scores via Q (query), K (key), V (value) projections: softmax(QKᵀ/√d)V. Multi-head attention runs attention in parallel across multiple subspaces. Computational complexity is O(n²) in sequence length — motivating efficient variants (Flash Attention, Sliding Window, Mamba). Understanding attention is fundamental to LLM optimization and context window scaling decisions."
  },
  {
    name: "Mixture of Experts (MoE)", cat: "arch", tags: ["Efficiency","Scaling","Mixtral","Sparse"],
    summary: "Activates only a subset of model parameters per input — enabling huge models cheaply",
    age10: "Mixture of Experts splits the model into many 'expert' sub-networks. For each input, a 'router' picks only 2-4 experts to activate. So even if the total model has hundreds of billions of parameters, only a fraction are used at once — making it faster and cheaper to run.",
    age45: "MoE replaces dense FFN layers with N expert sub-networks and a learned routing function (top-k gating). At inference, only k/N parameters are active per token, dramatically reducing FLOPs vs parameter count. Mixtral 8x7B, GPT-4 (alleged), and Gemini use MoE. Key tradeoff: memory cost is high (all experts must fit in VRAM), but throughput and quality/FLOP ratio improve significantly."
  },

  // ── KEY CONCEPTS ──────────────────────────────────────────
  {
    name: "Token / Tokenization", cat: "concept", tags: ["LLM","Input","Pricing","Context"],
    summary: "How text is broken into chunks that AI models can process — also the billing unit for LLM APIs",
    age10: "LLMs don't read word-by-word or letter-by-letter. They split text into 'tokens' — roughly 3-4 characters each. 'ChatGPT is cool' ≈ 5 tokens. Why? It's computationally efficient and handles new words better. API pricing is per token, so knowing token counts matters for cost management.",
    age45: "Tokenization (BPE, WordPiece, SentencePiece) converts text to integer IDs. ~1 token ≈ 0.75 English words; code tokenizes less efficiently. Critical for PMs: context window limits (128K-1M tokens) affect maximum document length; API cost = input + output tokens × price/1M. Token efficiency (prompt compression, caching) is a key LLM cost optimization lever."
  },
  {
    name: "Embedding", cat: "concept", tags: ["Vector","Semantic Search","RAG","Similarity"],
    summary: "A numerical representation of text (or images) that captures semantic meaning",
    age10: "Embeddings convert text into lists of numbers (vectors) where similar meanings = similar numbers. 'King' – 'Man' + 'Woman' ≈ 'Queen' in embedding space. Used in search (find related content), recommendations (similar items), and RAG (find relevant documents to give to an LLM).",
    age45: "Embeddings are dense vector representations in high-dimensional space (768–4096 dimensions) where semantic proximity ≈ cosine similarity. Core to RAG pipelines, semantic search (replacing keyword search), classification, and clustering. Models: text-embedding-3 (OpenAI), E5, BGE. Stored in vector databases (Pinecone, Weaviate, pgvector). Embedding quality is a key variable in RAG pipeline performance."
  },
  {
    name: "RAG (Retrieval-Augmented Generation)", cat: "concept", tags: ["Architecture","LLM","Search","Grounding","Enterprise"],
    summary: "Combine LLM generation with real-time retrieval from your own knowledge base",
    age10: "RAG solves the problem of LLMs not knowing recent or private information. When you ask a question, the system first searches a database of documents (using embeddings) to find relevant ones. It then passes those documents to the LLM as context, so the LLM answers based on real data instead of guessing.",
    age45: "RAG (Lewis et al., 2020) decouples parametric memory (model weights) from non-parametric memory (retrieval index). Architecture: query → embed → vector search → top-k chunks → LLM prompt → answer. Addresses LLM limitations: hallucination, knowledge cutoff, context window constraints. Key PM consideration: RAG quality depends on chunking strategy, embedding model, retrieval k, and prompt engineering — all tunable product variables."
  },
  {
    name: "Hallucination", cat: "concept", tags: ["LLM","Risk","Reliability","Accuracy"],
    summary: "When an AI confidently states false information — a core limitation of current LLMs",
    age10: "Hallucination is when an LLM generates plausible-sounding but incorrect information with confidence. It might invent fake research papers, wrong dates, or non-existent laws. It happens because LLMs predict likely text, not verified facts. Mitigation: RAG, citations, fact-checking layers, and limiting to in-context information.",
    age45: "Hallucination is the tendency of generative models to produce factually incorrect, fabricated, or internally inconsistent output while maintaining confident tone. Root cause: next-token prediction optimizes fluency, not factuality. Mitigation strategies: RAG grounding, chain-of-thought reasoning, function calling with external verification, model-level RLHF, and output citation requirements. Hallucination rate is a critical metric for any enterprise LLM deployment."
  },
  {
    name: "Fine-Tuning", cat: "concept", tags: ["Training","Customization","LoRA","Domain Adaptation"],
    summary: "Further train a pre-trained model on your specific data to specialize its behavior",
    age10: "Fine-tuning takes an existing pre-trained model and trains it further on a smaller, specialized dataset. A general LLM can be fine-tuned on medical texts to become a medical AI, or on customer support logs to follow a company's style. It's much cheaper than training from scratch.",
    age45: "Fine-tuning updates model weights on domain-specific (X, y) pairs, adapting behavior without full pre-training costs. Full fine-tuning updates all parameters; parameter-efficient methods (LoRA, QLoRA, prefix tuning) update <1% of weights with comparable results. Use cases: instruction following, style alignment, domain knowledge injection, and safety behavior modification. Key tradeoff vs. RAG: fine-tuning changes implicit knowledge; RAG changes retrieved knowledge — complementary strategies."
  },
  {
    name: "Prompt Engineering", cat: "concept", tags: ["LLM","No-Code","Technique","Chain of Thought"],
    summary: "The craft of writing inputs that reliably get the best outputs from an LLM",
    age10: "Prompt engineering is structuring your inputs to get better AI outputs. Techniques: few-shot prompting (show examples), chain-of-thought (ask the AI to think step-by-step), system prompts (set persona and constraints), and structured output (ask for JSON). It's the fastest way to improve LLM performance without code.",
    age45: "Prompt engineering encompasses techniques to guide LLM output without weight updates. Key methods: zero/few-shot learning, chain-of-thought (Wei et al., 2022), ReAct, self-consistency, and meta-prompting. For PMs: prompt versioning, A/B testing, and evals are essential for production systems. System prompt security (prompt injection) is a growing attack vector. Increasingly automated via DSPy and similar frameworks."
  },
  {
    name: "Context Window", cat: "concept", tags: ["LLM","Memory","Tokens","Limitations"],
    summary: "The maximum amount of text an LLM can 'see' at once in a single conversation",
    age10: "The context window is how much text an LLM can process in one go — including your conversation history, documents, and instructions. Older models: 4K tokens (~3,000 words). Modern models: 128K–1M tokens. Longer context = more expensive but lets you analyze entire codebases or books at once.",
    age45: "Context window defines the maximum input+output token capacity per inference pass. Scaling: GPT-4 Turbo 128K, Claude 3 200K, Gemini 1.5 Pro 1M. Longer context incurs O(n²) attention cost, though Flash Attention and sliding window reduce this. Key PM tradeoffs: longer context ↑ capability but ↑ latency and cost. 'Lost in the middle' research shows retrieval performance degrades for content in the middle of long contexts."
  },
  {
    name: "RLHF (Reinforcement Learning from Human Feedback)", cat: "concept", tags: ["Alignment","Safety","Training","LLM","GPT"],
    summary: "The training technique that makes LLMs helpful and aligned — key to ChatGPT's behavior",
    age10: "RLHF is a three-step process: first train a model to predict text, then train it to predict which of two responses humans prefer (the reward model), then use reinforcement learning to fine-tune the main model to generate responses humans rate highly. This is what makes ChatGPT feel helpful vs. other LLMs.",
    age45: "RLHF (Christiano et al., 2017; applied to LLMs by InstructGPT, 2022) consists of: (1) supervised fine-tuning on demonstrations, (2) reward model training on human preference pairs, (3) PPO optimization against the reward model with a KL-divergence penalty. Alternatives: DPO (Direct Preference Optimization) skips the reward model step. Constitutional AI (Anthropic) uses AI feedback instead of human feedback. RLHF is the key alignment technique for all major LLMs."
  },
  {
    name: "Parameters / Weights", cat: "concept", tags: ["Model Size","Training","Capacity","Scale"],
    summary: "The numbers inside a neural network that encode learned knowledge — measured in billions",
    age10: "Parameters are the internal numbers that a neural network learns during training. GPT-3 has 175 billion parameters. More parameters generally means the model can store more knowledge and handle more complex tasks — but it also requires more computing power. 'Model size' usually refers to parameter count.",
    age45: "Parameters (weights and biases) encode learned representations; gradient descent optimizes them during training. Scaling laws (Kaplan et al., Chinchilla) show compute-optimal training requires proportional data scaling. For product decisions: parameter count influences inference cost, latency, and memory requirements. Quantization (INT8, INT4) reduces memory at modest quality loss. Model distillation creates smaller, faster models from larger teachers."
  },

  // ── AI ROLES ─────────────────────────────────────────────
  {
    name: "AI Product Manager", cat: "role", tags: ["PM","Strategy","Non-Technical","Business","Leadership"],
    summary: "Defines what AI should do, for whom, and why — bridges business goals and technical teams",
    age10: "An AI PM defines what AI features to build and why. They work out: what problem does this solve? Who are the users? How do we know if it worked? They translate business goals into technical requirements, and translate technical limitations back to stakeholders. They don't need to code, but need to understand AI well enough to spot BS.",
    age45: "The AI PM role combines traditional product management with AI-specific skills: defining success metrics for probabilistic systems, managing model evaluation and evals pipelines, understanding data requirements and labeling workflows, navigating build/buy/fine-tune decisions, and communicating model limitations to stakeholders. Key differentiators: comfort with uncertainty, understanding of responsible AI principles, and ability to scope MVP given inherent model variability."
  },
  {
    name: "Machine Learning Engineer", cat: "role", tags: ["MLE","Engineering","Training","Production","Python"],
    summary: "Builds, trains, and deploys ML models into production systems",
    age10: "ML engineers write the code that trains and deploys AI models. They choose the right algorithm for a problem, prepare training data, run experiments, monitor model performance, and build the systems that serve predictions to real users. They work in Python and use frameworks like PyTorch or TensorFlow.",
    age45: "ML engineers bridge research and production. Responsibilities: feature engineering, model training and hyperparameter optimization, experiment tracking (MLflow, W&B), model serving (TensorRT, vLLM, Triton), and A/B testing. Key skills: PyTorch/JAX, distributed training, CUDA basics, and production monitoring. Distinct from data scientists (who are more analysis-focused) and MLOps engineers (infra-focused)."
  },
  {
    name: "Data Scientist", cat: "role", tags: ["Analytics","Statistics","Python","Insights","SQL"],
    summary: "Extracts insights from data and builds models to solve business problems",
    age10: "Data scientists explore data, find patterns, and build models to make predictions or decisions. They use statistics, Python (pandas, scikit-learn), SQL, and visualization tools. In an AI context, they often do exploratory analysis, feature engineering, and evaluate model performance — bridging business questions and technical solutions.",
    age45: "Data scientists combine statistical expertise with programming skills to extract actionable insights. AI-era responsibilities include: defining ML problem framing, building baseline models, running controlled experiments, and communicating uncertainty. The role increasingly overlaps with MLE; senior data scientists often specialize in experimentation (A/B testing, causal inference) or applied research. SQL, Python, and statistical fluency are table stakes."

  {
    name: "MLOps Engineer", cat: "role", tags: ["Infrastructure","DevOps","CI/CD","Deployment","Monitoring"],
    summary: "Keeps ML systems running reliably in production — the DevOps of machine learning",
    age10: "MLOps engineers build the infrastructure that lets models run reliably at scale. They automate training pipelines, manage model versioning, monitor for performance drift, and handle deployment. Think of them as DevOps engineers whose systems happen to include ML models.",
    age45: "MLOps covers the operational lifecycle of ML systems: automated training pipelines (Kubeflow, Airflow), model registry and versioning (MLflow), feature stores (Feast, Tecton), serving infrastructure (KServe, Ray Serve), and monitoring for data drift, concept drift, and performance degradation. Key metrics: model latency, throughput, staleness, and prediction quality over time. Critical role as ML systems scale beyond experimentation."
  },
  {
    name: "Model Context Protocol (MCP)", cat: "concept", tags: ["Agents","Anthropic","Standard","Tools","Integration","2024"],
    summary: "The open standard that lets AI agents connect to any tool or data source — the 'USB-C for AI'",
    age10: "Before MCP, developers had to build a custom connector every time an AI needed to use a new tool — so 10 tools meant 10 connectors. MCP (Model Context Protocol) is an open standard by Anthropic (Nov 2024) that gives AI agents one standard way to connect to any tool or data source. Now one connector works everywhere. OpenAI, Google, and Microsoft all adopted it in 2025.",
    age45: "MCP (Anthropic, Nov 2024) solves the N×M integration problem: without a standard, connecting N agents to M tools requires N×M custom integrations. MCP reduces this to N+M. It defines a client-server protocol where AI agents (clients) connect to MCP servers that expose tools and data. By Feb 2026: 97M monthly SDK downloads, adopted by all major AI providers. Donated to the Linux Foundation Agentic AI Foundation (AAIF) in Dec 2025. Security note: prompt injection and tool permission vulnerabilities remain active concerns. Key for PMs: MCP dramatically reduces integration cost for agentic product builds."
  },
  {
    name: "Computer Use / Tool Use", cat: "concept", tags: ["Agents","Agentic","GUI","Automation","Claude","GPT-5"],
    summary: "AI that can control a computer — clicking, typing, browsing — to complete tasks autonomously",
    age10: "Computer use lets AI models operate a real computer: open a browser, search the web, fill out forms, write and run code, read emails. Claude's Computer Use (2024) and GPT-5.4's computer use (2025) can complete multi-step computer tasks autonomously. It's a big step toward AI that can handle any digital work a human can.",
    age45: "Computer use (Claude Computer Use Oct 2024; GPT-5.4 native CU 2025) enables LLMs to perceive GUI screenshots and emit mouse/keyboard actions — turning any desktop or web application into an agent-accessible tool without requiring an API. Architecture: vision model → action prediction → emulated input. Key enterprise applications: legacy system automation, web scraping without APIs, QA testing, and RPA replacement. Key risks: unrestricted computer access significantly expands the attack surface for prompt injection. Best practice: run in sandboxed VMs with scoped permissions and human-in-the-loop checkpoints."
  },

  {
    name: "AI Research Scientist", cat: "role", tags: ["Research","Publications","Academia","PhD","Novel Methods"],
    summary: "Advances the state of the art through novel algorithms, architectures, and experiments",
    age10: "AI researchers work on inventing new techniques — new neural network designs, new training methods, or solving fundamental problems in AI. They publish papers (often on arXiv), run massive experiments, and their work eventually becomes the foundation that engineers build products on. GPT, transformers, and diffusion models all started as research.",
    age45: "AI research scientists (typically PhD-level) design and validate novel methods, often publishing at NeurIPS, ICML, ICLR. Applied research roles (at Anthropic, Google DeepMind, Meta FAIR) bridge pure research with product needs. For product leaders: understanding which research outputs are productizable vs. academic is a competitive advantage. Key skills: mathematical rigor, experimental design, literature synthesis, and scientific writing."
  },
  {
    name: "Prompt Engineer", cat: "role", tags: ["LLM","No-Code","Optimization","Workflows"],
    summary: "Specializes in crafting and optimizing prompts to maximize LLM output quality",
    age10: "A prompt engineer designs the exact text instructions given to an LLM to get the best results. They test different phrasings, use techniques like chain-of-thought and few-shot examples, build prompt templates, and systematically evaluate which prompts work best — often without writing much code.",
    age45: "Prompt engineering emerged as a distinct role with LLM adoption, though it's evolving: as models improve (GPT-4o, Claude 3.5), the delta between naive and optimized prompts narrows. Current value-add: systematic evaluation (evals), multi-step agentic workflow design, adversarial testing, and prompt injection defense. The role is converging with AI engineering as workflows become code-based (LangChain, DSPy)."
  },
  {
    name: "AI Ethics Officer / Responsible AI Lead", cat: "role", tags: ["Ethics","Governance","Policy","Risk","Fairness"],
    summary: "Ensures AI systems are fair, transparent, safe, and compliant with regulations",
    age10: "AI ethics officers review AI systems for bias, fairness, transparency, and potential harm. They create guidelines for how AI should be used, evaluate risks before launch, and ensure compliance with laws like GDPR and the EU AI Act. They often work with lawyers, ethicists, and engineers.",
    age45: "Responsible AI (RAI) roles govern the ethical development and deployment of AI systems. Responsibilities include: bias auditing and fairness metrics (demographic parity, equalized odds), model transparency and explainability (SHAP, LIME), privacy compliance (differential privacy, data minimization), and regulatory alignment (EU AI Act risk tiers, NIST AI RMF). Increasingly required for enterprise procurement and high-stakes verticals (healthcare, finance, hiring)."
  },
  {
    name: "AI Solutions Architect", cat: "role", tags: ["Architecture","Enterprise","Cloud","Integration","Design"],
    summary: "Designs how AI components integrate into enterprise systems and infrastructure",

    age45: "AI solutions architects translate business requirements into technical AI system designs. Competencies: cloud AI services (Azure OpenAI, AWS Bedrock, Google Vertex), LLM integration patterns (RAG, function calling, agents), cost modeling (build vs. buy vs. fine-tune), security (data residency, encryption, access control), and vendor evaluation. Interface between C-suite AI strategy and engineering implementation."
  },

// ── Search & Filter State ────────────────────────────────────
let currentAge   = "10";
let currentCat   = "all";
let currentQuery = "";
let filtered     = [...DATA];

const fuse = new Fuse(DATA, {
  keys: [
    { name: "name",    weight: 3 },
    { name: "summary", weight: 2 },
    { name: "tags",    weight: 2 },
    { name: "age10",   weight: 1 },
    { name: "age45",   weight: 1 },
  ],
  threshold: 0.35,
  includeScore: true,
});

// ── Category Config ──────────────────────────────────────────
const catClass = {
  model:    "cat-model",
  "ml-type":"cat-ml-type",
  arch:     "cat-arch",
  concept:  "cat-concept",
  role:     "cat-role",
  cloud:      "cat-cloud",
  challenge:  "cat-challenge",
};
const catLabel = {
  model:    "AI Model",
  "ml-type":"ML Type",
  arch:     "Architecture",
  concept:  "Concept",
  role:       "Role",
  cloud:      "Cloud Service",
  challenge:  "Challenge",
};

// ── Render ───────────────────────────────────────────────────
function render() {
  const grid  = document.getElementById("grid");
  const count = document.getElementById("count");
  grid.innerHTML = "";

  // Search
  let results;
  if (currentQuery.trim()) {
    results = fuse.search(currentQuery).map(r => r.item);
  } else {
    results = [...DATA];
  }

  // Category filter
  if (currentCat !== "all") {
    results = results.filter(d => d.cat === currentCat);
  }

  count.textContent = `${results.length} result${results.length !== 1 ? "s" : ""}`;

  if (results.length === 0) {
    grid.innerHTML = '<div class="no-results">No results found. Try a different search term.</div>';
    return;
  }

  results.forEach(item => {
    const expl = currentAge === "10" ? item.age10 : item.age45;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-header">
        <div class="card-name">${item.name}</div>
        <span class="cat-badge ${catClass[item.cat]}">${catLabel[item.cat]}</span>
      </div>
      <div class="card-summary">${item.summary}</div>
      <div class="tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      <div class="explanation">${expl}</div>
    `;
    grid.appendChild(card);
  });
}

// ── Event Listeners ──────────────────────────────────────────
document.getElementById("search").addEventListener("input", e => {
  currentQuery = e.target.value;
  render();
});

document.querySelectorAll(".age-toggle button").forEach(btn => {
  btn.addEventListener("click", () => {
    currentAge = btn.dataset.age;
    document.querySelectorAll(".age-toggle button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    currentCat = btn.dataset.cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

// ── Init ─────────────────────────────────────────────────────
render();
</script>
